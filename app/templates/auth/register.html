{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Registrieren</h4>

        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.register') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="email" class="form-label">E-Mail</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              autocomplete="email"
              required
              autofocus>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Passwort</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              autocomplete="new-password"
              required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Konto erstellen</button>
          </div>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">
      Bereits registriert? <a href="{{ url_for('auth.login') }}">Zum Login</a>
    </p>
  </div>
</div>
{% endblock %}
