{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Profil</h2>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card mb-4">
      <div class="card-header">Spitzname</div>
      <div class="card-body">
        <p class="text-muted mb-1">E-Mail</p>
        <p class="mb-3"><strong>{{ current_user.email }}</strong></p>

        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="nickname" class="form-label">Spitzname</label>
            <input type="text" class="form-control" id="nickname" name="nickname"
                   value="{{ current_user.nickname or '' }}"
                   placeholder="{{ current_user.email.split('@')[0] }}"
                   minlength="3" maxlength="30" required>
            <div class="form-text">3–30 Zeichen. Wird überall anstelle der E-Mail angezeigt.</div>
          </div>
          <button type="submit" class="btn btn-primary">Speichern</button>
          <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary ms-2">Abbrechen</a>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Passwort ändern</div>
      <div class="card-body">
        <form method="post" action="{{ url_for('settings.change_password') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="old_password" class="form-label">Aktuelles Passwort</label>
            <input type="password" class="form-control" id="old_password" name="old_password"
                   autocomplete="current-password" required>
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label">Neues Passwort</label>
            <div class="input-group">
              <input type="password" class="form-control" id="new_password" name="new_password"
                     autocomplete="new-password" minlength="8" required>
              <button type="button" class="btn btn-outline-secondary" id="toggleNewPassword"
                      aria-label="Passwort anzeigen/verbergen">
                <span id="toggleNewPasswordIcon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                  </svg>
                </span>
              </button>
            </div>
            <div class="form-text">Mindestens 8 Zeichen.</div>
          </div>
          <button type="submit" class="btn btn-warning">Passwort ändern</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce() }}">
(function() {
  var eyeIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>';
  var eyeSlashIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/><path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/></svg>';
  document.getElementById('toggleNewPassword').addEventListener('click', function() {
    var input = document.getElementById('new_password');
    var icon = document.getElementById('toggleNewPasswordIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = eyeSlashIcon;
    } else {
      input.type = 'password';
      icon.innerHTML = eyeIcon;
    }
  });
}());
</script>
{% endblock %}
