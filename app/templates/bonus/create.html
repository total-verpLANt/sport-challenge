{% extends "base.html" %}
{% block content %}
<h2>Neue Bonus-Challenge erstellen</h2>

{% if active_challenge %}
<p class="text-muted">Challenge: <strong>{{ active_challenge.name }}</strong></p>
{% endif %}

<form method="post" action="{{ url_for('bonus.create_post') }}" class="mt-3" id="bonus-create-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="row g-3">
    <div class="col-12">
      <label for="description" class="form-label">Beschreibung</label>
      <input type="text" class="form-control" id="description" name="description"
             value="{{ form_data.description if form_data else '50 Squat Jumps' }}"
             placeholder="z.B. 50 Squat Jumps" required>
    </div>

    <div class="col-12">
      <label class="form-label">Termine <span class="text-muted small">(mehrere möglich)</span></label>
      <div id="date-list" class="d-flex flex-column gap-2">
        <div class="input-group date-row" style="max-width: 280px;">
          <input type="date" class="form-control" name="scheduled_date"
                 value="{{ form_data.getlist('scheduled_date')[0] if form_data and form_data.getlist('scheduled_date') else '' }}"
                 required>
          <button type="button" class="btn btn-outline-danger remove-date" title="Entfernen">✕</button>
        </div>
      </div>
      <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="add-date">
        + Termin hinzufügen
      </button>
    </div>

    <div class="col-12 mt-3">
      <button type="submit" class="btn btn-primary">Bonus-Challenge erstellen</button>
      <a href="{{ url_for('bonus.index') }}" class="btn btn-outline-secondary ms-2">Abbrechen</a>
    </div>
  </div>
</form>

<script nonce="{{ csp_nonce() }}">
(function () {
  const dateList = document.getElementById('date-list');

  function updateRemoveButtons() {
    const rows = dateList.querySelectorAll('.date-row');
    rows.forEach(row => {
      const btn = row.querySelector('.remove-date');
      btn.disabled = rows.length === 1;
    });
  }

  document.getElementById('add-date').addEventListener('click', function () {
    const newRow = document.createElement('div');
    newRow.className = 'input-group date-row';
    newRow.style.maxWidth = '280px';
    newRow.innerHTML =
      '<input type="date" class="form-control" name="scheduled_date" required>' +
      '<button type="button" class="btn btn-outline-danger remove-date" title="Entfernen">✕</button>';
    newRow.querySelector('.remove-date').addEventListener('click', function () {
      newRow.remove();
      updateRemoveButtons();
    });
    dateList.appendChild(newRow);
    updateRemoveButtons();
    newRow.querySelector('input').focus();
  });

  dateList.addEventListener('click', function (e) {
    if (e.target.classList.contains('remove-date')) {
      e.target.closest('.date-row').remove();
      updateRemoveButtons();
    }
  });

  updateRemoveButtons();
})();
</script>
{% endblock %}
