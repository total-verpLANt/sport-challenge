services:
  web:
    image: ${DOCKERHUB_USERNAME:-changeme}/sport-challenge:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_APP: run.py
      GUNICORN_WORKERS: "1"
    volumes:
      - ./data/instance:/app/instance
      - ./data/uploads:/app/app/static/uploads
      - ./data/logs:/app/logs
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
